<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 폴더별 사진 공간</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            padding: 40px 20px;
            margin: 0;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        
        /* 폴더 생성 영역 디자인 */
        .create-folder-container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }
        #folderNameInput {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 250px;
            margin-right: 10px;
            outline: none;
        }
        #folderNameInput:focus {
            border-color: #4CAF50;
        }
        .btn {
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #45a049;
        }

        /* 개별 폴더 영역 디자인 */
        .folder-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            animation: slideDown 0.4s ease-out;
        }
        .folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .folder-header h2 {
            margin: 0;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 각 폴더 안의 갤러리 영역 */
        .folder-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        /* 📸 사진 카드 및 삭제 버튼 디자인 */
        .photo-card {
            position: relative; /* 삭제 버튼을 사진 위에 올리기 위해 필요 */
            width: 200px;
            height: 200px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            animation: fadeIn 0.4s ease-in;
            background-color: #fafafa;
        }
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .photo-card:hover img {
            transform: scale(1.05); /* 마우스 올리면 사진이 살짝 커지는 효과 */
        }
        
        /* 삭제 버튼 (기본적으로 숨겨둠) */
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: rgba(255, 59, 48, 0.85);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; /* 평소엔 투명하게 */
            transition: opacity 0.2s;
        }
        .delete-btn:hover {
            background-color: rgb(255, 59, 48);
        }
        /* 마우스를 사진 카드에 올렸을 때 삭제 버튼이 나타나게 함 */
        .photo-card:hover .delete-btn {
            opacity: 1; 
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>내 사진 정리함 🗂️</h1>
        <p>폴더를 만들고 그 안에 사진을 보관해 보세요.</p>
    </div>

    <div class="create-folder-container">
        <input type="text" id="folderNameInput" placeholder="새 폴더 이름 입력">
        <button class="btn" onclick="createFolder()">+ 폴더 만들기</button>
    </div>

    <div id="folders-container"></div>

    <script>
        // 폴더를 만드는 함수
        function createFolder() {
            const folderNameInput = document.getElementById('folderNameInput');
            const folderName = folderNameInput.value.trim() || '새 폴더'; 
            
            const folderDiv = document.createElement('div');
            folderDiv.className = 'folder-section';
            
            folderDiv.innerHTML = `
                <div class="folder-header">
                    <h2>📁 ${folderName}</h2>
                    <label class="btn">
                        사진 추가하기
                        <input type="file" accept="image/*" multiple style="display: none;">
                    </label>
                </div>
                <div class="folder-gallery"></div>
            `;
            
            const fileInput = folderDiv.querySelector('input[type="file"]');
            const gallery = folderDiv.querySelector('.folder-gallery');
            
            fileInput.addEventListener('change', function(event) {
                const files = event.target.files;
                
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    
                    if (file && file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        
                        reader.onload = function(e) {
                            // 1. 사진 카드 만들기
                            const photoCard = document.createElement('div');
                            photoCard.className = 'photo-card';
                            
                            // 2. 이미지 넣기
                            const imgElement = document.createElement('img');
                            imgElement.src = e.target.result;
                            
                            // 3. 삭제 버튼 만들기
                            const deleteBtn = document.createElement('button');
                            deleteBtn.className = 'delete-btn';
                            deleteBtn.innerHTML = '✕';
                            deleteBtn.title = '사진 삭제';
                            
                            // 4. 삭제 버튼을 눌렀을 때의 동작 설정
                            deleteBtn.onclick = function() {
                                photoCard.remove(); // 화면에서 해당 사진 카드 지우기
                            };
                            
                            // 카드 안에 이미지와 삭제 버튼을 합치기
                            photoCard.appendChild(imgElement);
                            photoCard.appendChild(deleteBtn);
                            
                            // 갤러리에 카드 추가
                            gallery.appendChild(photoCard);
                        };
                        
                        reader.readAsDataURL(file);
                    }
                }
                event.target.value = ''; 
            });
            
            document.getElementById('folders-container').appendChild(folderDiv);
            folderNameInput.value = ''; 
        }

        // 엔터키를 눌러도 폴더가 만들어지게 설정
        document.getElementById('folderNameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                createFolder();
            }
        });
    </script>
</body>
</html>
