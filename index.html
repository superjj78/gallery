<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클라우드 폴더별 사진 공간</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; color: #333; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { margin-bottom: 10px; color: #1a1a1a; }
        .info-text { color: #0066cc; font-size: 15px; font-weight: bold; }
        
        .create-folder-container { text-align: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 40px; }
        #folderNameInput { padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; width: 250px; margin-right: 10px; outline: none; }
        .btn { border: none; padding: 12px 24px; cursor: pointer; background-color: #4CAF50; color: white; border-radius: 8px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:hover { background-color: #45a049; }
        .btn:disabled { background-color: #cccccc; cursor: not-allowed; }

        .folder-section { background: white; border-radius: 15px; padding: 25px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .folder-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .folder-header h2 { margin: 0; display: flex; align-items: center; gap: 10px; }
        .delete-folder-btn { background-color: #ff3b30; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px;}
        
        .folder-gallery { display: flex; flex-wrap: wrap; gap: 15px; }
        .photo-card { position: relative; width: 200px; height: 200px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background-color: #fafafa; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .delete-btn { position: absolute; top: 8px; right: 8px; background-color: rgba(255, 59, 48, 0.85); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-weight: bold; cursor: pointer; opacity: 0; transition: 0.2s; }
        .photo-card:hover .delete-btn { opacity: 1; }
        
        /* 로딩 표시 (업로드 중일 때) */
        .loading { display: none; font-size: 14px; color: #ff9800; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>☁️ 내 클라우드 사진 앨범</h1>
        <p>파이어베이스 서버와 연결되었습니다. 폰에서도 똑같이 볼 수 있어요!</p>
        <p class="info-text" id="status-msg">서버 연결 중...</p>
    </div>

    <div class="create-folder-container">
        <input type="text" id="folderNameInput" placeholder="새 폴더 이름 입력">
        <button class="btn" id="createFolderBtn">+ 폴더 만들기</button>
    </div>

    <div id="folders-container"></div>

    <script type="module">
        // 파이어베이스 라이브러리 불러오기
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // 🔥 [매우 중요] 여기에 아까 복사한 본인의 firebaseConfig를 덮어쓰세요! 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyA86Uu7rHjnlYVehiEQWMBIYHH2Nmcl6qY",
  authDomain: "myphotogallery-c450b.firebaseapp.com",
  projectId: "myphotogallery-c450b",
  storageBucket: "myphotogallery-c450b.firebasestorage.app",
  messagingSenderId: "349282605357",
  appId: "1:349282605357:web:c9a393f268fe29399adba4",
  measurementId: "G-ZN60PHL50N"
        };

        // 파이어베이스 시작
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        document.getElementById('status-msg').innerText = "✅ 클라우드 서버 연결 완료!";

        // 화면 요소들
        const container = document.getElementById('folders-container');
        const createFolderBtn = document.getElementById('createFolderBtn');
        const folderNameInput = document.getElementById('folderNameInput');

        // 1. 서버에서 실시간으로 폴더 데이터 가져오기
        onSnapshot(collection(db, "folders"), (snapshot) => {
            container.innerHTML = ''; // 화면 비우기
            snapshot.forEach((docSnap) => {
                const folderId = docSnap.id;
                const folderData = docSnap.data();
                renderFolder(folderId, folderData);
            });
        });

        // 2. 새 폴더 만들기 (서버에 저장)
        createFolderBtn.addEventListener('click', async () => {
            const folderName = folderNameInput.value.trim() || '새 폴더';
            createFolderBtn.disabled = true;
            try {
                await addDoc(collection(db, "folders"), {
                    name: folderName,
                    photos: [],
                    createdAt: Date.now()
                });
                folderNameInput.value = '';
            } catch (e) {
                alert("폴더 생성 실패: " + e.message);
            }
            createFolderBtn.disabled = false;
        });

        // 3. 폴더를 화면에 그리기
        function renderFolder(folderId, folderData) {
            const folderDiv = document.createElement('div');
            folderDiv.className = 'folder-section';
            
            folderDiv.innerHTML = `
                <div class="folder-header">
                    <h2>📁 ${folderData.name} <button class="delete-folder-btn" id="del-folder-${folderId}">폴더 삭제</button></h2>
                    <div style="text-align: right;">
                        <label class="btn">
                            ☁️ 사진 업로드
                            <input type="file" accept="image/*" multiple style="display: none;" id="upload-${folderId}">
                        </label>
                        <div class="loading" id="loading-${folderId}">사진을 클라우드에 올리는 중... ⏳</div>
                    </div>
                </div>
                <div class="folder-gallery" id="gallery-${folderId}"></div>
            `;
            container.appendChild(folderDiv);

            const gallery = document.getElementById(`gallery-${folderId}`);
            
            // 사진들 화면에 그리기
            if(folderData.photos && folderData.photos.length > 0) {
                folderData.photos.forEach(photo => renderPhoto(gallery, folderId, photo));
            }

            // 폴더 삭제 이벤트
            document.getElementById(`del-folder-${folderId}`).addEventListener('click', async () => {
                if(confirm('이 폴더를 정말 삭제할까요? (안의 사진은 스토리지에 남을 수 있습니다)')) {
                    await deleteDoc(doc(db, "folders", folderId));
                }
            });

            // 사진 업로드 이벤트 (스토리지에 저장 -> DB에 URL 기록)
            document.getElementById(`upload-${folderId}`).addEventListener('change', async (e) => {
                const files = e.target.files;
                if(files.length === 0) return;
                
                const loadingMsg = document.getElementById(`loading-${folderId}`);
                loadingMsg.style.display = 'block';

                const folderRef = doc(db, "folders", folderId);

                for(let i=0; i<files.length; i++) {
                    const file = files[i];
                    // 고유한 파일 이름 만들기
                    const uniqueFileName = Date.now() + '_' + file.name;
                    const storageRef = ref(storage, `photos/${folderId}/${uniqueFileName}`);
                    
                    try {
                        // 스토리지에 파일 업로드
                        const snapshot = await uploadBytes(storageRef, file);
                        // 업로드된 파일의 다운로드 주소 가져오기
                        const downloadURL = await getDownloadURL(snapshot.ref);
                        
                        // DB에 사진 정보(URL과 스토리지 경로) 추가
                        await updateDoc(folderRef, {
                            photos: arrayUnion({
                                url: downloadURL,
                                storagePath: snapshot.ref.fullPath
                            })
                        });
                    } catch (error) {
                        console.error("업로드 에러:", error);
                    }
                }
                loadingMsg.style.display = 'none';
                e.target.value = ''; // 입력창 초기화
            });
        }

        // 4. 사진을 화면에 그리기 & 삭제 기능
        function renderPhoto(gallery, folderId, photo) {
            const photoCard = document.createElement('div');
            photoCard.className = 'photo-card';
            
            photoCard.innerHTML = `
                <img src="${photo.url}" alt="클라우드 사진">
                <button class="delete-btn" title="사진 삭제">✕</button>
            `;

            // 사진 삭제 기능 (스토리지에서 지우고 -> DB에서 지우기)
            photoCard.querySelector('.delete-btn').addEventListener('click', async () => {
                if(!confirm('클라우드에서 이 사진을 완전히 삭제할까요?')) return;
                
                try {
                    // 스토리지(실제 파일)에서 삭제
                    const photoRef = ref(storage, photo.storagePath);
                    await deleteObject(photoRef);
                    
                    // DB(정보)에서 삭제
                    await updateDoc(doc(db, "folders", folderId), {
                        photos: arrayRemove(photo)
                    });
                } catch(e) {
                    console.error("삭제 에러:", e);
                    alert("삭제 중 오류가 발생했습니다.");
                }
            });

            gallery.appendChild(photoCard);
        }
    </script>
</body>
</html>
